nterprise Environmental Factors)."

d by EEFs."

ments, Team Performance Assessments, and Issue Logs as\nthe primary human-related inputs. Note: In some versions of the guide, EEFs are listed as general\ninfluences, but Work Performance Reports is the most specific, high-value document used to drive\nthe \"management\" of the team."

y been spent on the creation of the product or service."

ecting and distributing performance information. It provides the data that might lead to a claim,\nbut it is not the technique used to resolve the dispute."

ierarchy."

sis ensures that the project\nschedule is realistic and contains enough flexibility to handle the inherent uncertainties of project\nwork."

ke a\ndecision, the metrics themselves are not decision-making techniques.\nAs per the PMI Lexicon of Project Management Terms, analytical techniques provide the objective\ndata required for \"Data-Driven Decision Making,\" ensuring that the project's economic feasibility is\nverified before significant resources are committed."

ial constraints."

e Identify Risks\nprocess helps the project team think \"outside the box\" to uncover risks that might not be\nimmediately apparent through traditional checklist or brainstorming methods."

wers PDF 102/1621\n\n\nQuestions & Answers PDF P-103\n\nallow for the management and decision-making process itself.\nAs per the PMI Lexicon of Project Management Terms, Change Control Tools ensure that only\napproved changes are incorporated into the project, thereby preventing \"scope creep\" and ensuring\nall impacts are integrated across the Knowledge Areas."

    }

    function handleNext() { if (currentIndex < questions.length - 1) { currentIndex++; renderQuiz(); } }
    function handlePrev() { if (currentIndex > 0) { currentIndex--; renderQuiz(); } }
    function finishQuiz() {
        reviewMode = true;
        const letterToIndex = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 };
        let score = userAnswers.filter((ans, i) => ans === letterToIndex[questions[i].correctAnswer]).length;
        let attempted = userAnswers.filter(ans => ans !== null).length;
        alert(`Quiz Finished!\nYou answered ${attempted} out of ${questions.length} questions.\nYour score: ${score}/${questions.length}`);
        renderQuiz();
    }
    window.onload = renderQuiz;
</script>
