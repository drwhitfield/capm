        .nav-controls { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border-color); }
        .btn { background-color: var(--accent-blue); color: var(--bg-primary); border: none; border-radius: 6px; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background-color: var(--border-color); color: var(--text-muted); cursor: not-allowed; }

    const questionBank = [
        {
                "id": 1,
                "original_id": 1,
                "question": "Which document defines how a project is executed, monitored and controlled, and closed?",
                "options": {
                        "A": "Strategic plan",
                        "B": "Project charter",
                        "C": "Project management plan",
                        "D": "Service level agreement"
                },
                "correctAnswer": "C",
                "explanation": "According to the PMI (Project Management Institute) standards and the PMBOK\u00ae Guide (6th and 7th\nEditions), the Project Management Plan is the formal document that describes how the project will\nbe executed, monitored and controlled, and closed. It is the primary tool used by the Project\nManager to ensure the project goals are met.\nHere is the breakdown of why this is the correct document based on PMI frameworks:\nIntegration Management: The development of this plan is a key process within Project Integration\nManagement. It aggregates all subsidiary management plans (such as Scope, Schedule, Cost, Quality,\nQuestions and Answers PDF 2/1621\n\n\nQuestions & Answers PDF P-3\n\nResource, Communications, Risk, Procurement, and Stakeholder plans) and the three baselines\n(Scope, Schedule, and Cost Performance).\nExecution and Control: While the Project Charter (Option B) authorizes the project and the project\nmanager, it does not provide the \"how-to\" details. The Project Management Plan provides the\nroadmap for the team to follow and the benchmarks against which performance is measured.\nClosing: The plan defines the criteria for project closure and the transition of the final product,\nservice, or result to operations.\nBaselines: It contains the \"Performance Measurement Baseline,\" which is the integrated scope-\nschedule-cost plan against which project execution is compared to measure and manage\nperformance."
        },
        {
                "id": 2,
                "original_id": 2,
                "question": "Which changes occur in risk and uncertainty as well as the cost of changes as the life cycle of a typical project progresses?",
                "options": {
                        "A": "Risk and uncertainty increase; the cost of changes increases.",
                        "B": "Risk and uncertainty increase; the cost of changes decreases,",
                        "C": "Risk and uncertainty decrease; the cost of changes increases.",
                        "D": "Risk and uncertainty decrease; the cost of changes decreases."
                },
                "correctAnswer": "C",
                "explanation": "According to the PMBOK\u00ae Guide (specifically regarding Project Life Cycle and Project Characteristics),\nthere is a standard relationship between time, risk, and cost as a project moves from initiation to\nclosure.\nRisk and Uncertainty: These are at their highest at the start of the project because many variables,\nrequirements, and external factors are unknown. As the project progresses, more information is\ngathered, the scope is clarified, and deliverables are completed, which causes risk and uncertainty to\ndecrease over time.\nQuestions and Answers PDF 3/1621\n\n\nQuestions & Answers PDF P-4\n\nCost of Changes: In the early stages (Initiation and Planning), the cost of making changes is relatively\nlow because the work hasn't physically started and few resources have been spent. However, as the\nproject moves into Execution and Monitoring and Controlling, more labor and materials are invested.\nChanging a requirement late in the life cycle (such as during testing or right before closing) is\nsignificantly more expensive because it often requires \"rework\" or discarding completed work,\ncausing the cost of changes to increase significantly.\nAnalysis of Options:\nA and B: Incorrect because risk and uncertainty naturally trend downward as the project\u2019s \"cone of\nuncertainty\" narrows through progressive elaboration.\nD: Incorrect because while it correctly identifies the decrease in risk, it ignores the financial reality\nthat late-stage changes are the most expensive."
        },
        {
                "id": 3,
                "original_id": 3,
                "question": "Which tool or technique is used in the Plan Scope Management process?",
                "options": {
                        "A": "Document analysis",
                        "B": "Observations",
                        "C": "Product analysis",
                        "D": "Expert judgment"
                },
                "correctAnswer": "D",
                "explanation": "According to the PMBOK\u00ae Guide, the Plan Scope Management process is the process of creating a\nscope management plan that documents how the project and product scope will be defined,\nvalidated, and controlled. This process occurs early in the Planning Process Group.\nExpert Judgment: This is a standard tool and technique for the Plan Scope Management process. It\ninvolves input from individuals or groups with specialized knowledge or training in similar projects,\nthe specific industry, or the technical area. Experts help define how the scope will be managed based\non organizational culture, complexity, and historical information.\nQuestions and Answers PDF 4/1621\n\n\nQuestions & Answers PDF P-5\n\nOther Tools for this Process: In addition to Expert Judgment, this process utilizes Data Analysis\n(specifically alternatives analysis) and Meetings.\nWhy the other options are incorrect:\nA . Document analysis: This is a tool and technique used in the Collect Requirements process, not\nPlan Scope Management. It involves reviewing existing documentation to identify requirements.\nB . Observations: Also known as \"job shadowing,\" this is a tool and technique used in Collect\nRequirements to understand business processes or requirements that users may find difficult to\narticulate.\nC . Product analysis: This is a tool and technique used in the Define Scope process. It involves\ndefining the product and its requirements in more detail through techniques like systems\nengineering or value engineering."
        },
        {
                "id": 4,
                "original_id": 4,
                "question": "Which tool or technique is an examination of industry and specific vendor capabilities?",
                "options": {
                        "A": "Independent estimates",
                        "B": "Market research",
                        "C": "Analytical techniques",
                        "D": "Bidder conferences"
                },
                "correctAnswer": "B",
                "explanation": "According to the PMBOK\u00ae Guide, specifically within the Plan Procurement Management process,\nMarket Research is a key tool and technique used to gather information about the availability of\nproducts, services, and the capabilities of specific providers in the marketplace.\nMarket Research: This technique involves examining industry and specific vendor capabilities. Project\nteams use it to refine procurement strategies, identify potential sellers, and understand market\nconditions. It often includes leveraging conferences, online reviews, and specialized journals to\ndetermine if the required deliverables can be provided by existing vendors or if a different approach\nQuestions and Answers PDF 5/1621\n\n\nQuestions & Answers PDF P-6\n\nis necessary.\nStrategic Alignment: By performing market research early, the project manager ensures that the\nprocurement requirements are realistic and that there are enough qualified vendors to ensure\ncompetitive bidding.\nWhy the other options are incorrect:\nA . Independent estimates: These are used during the Conduct Procurements process as a \"sanity\ncheck\" to compare vendor bid prices against an internally developed or third-party cost estimate.\nThey do not examine vendor capabilities.\nC . Analytical techniques: While a broad term, in a procurement context, this usually refers to \"Make-\nor-Buy Analysis,\" which focuses on whether the project team should produce an item internally or\npurchase it externally, rather than researching the vendors themselves.\nD . Bidder conferences: These are meetings held during the Conduct Procurements process between\nthe buyer and all prospective sellers before the submittal of a bid or proposal. Their purpose is to\nensure all sellers have a clear, common understanding of the procurement requirements, not to\nresearch the industry at large."
        },
        {
                "id": 5,
                "original_id": 5,
                "question": "An input used in developing the communications management plan is:",
                "options": {
                        "A": "Communication models.",
                        "B": "Enterprise environmental factors.",
                        "C": "Organizational communications,",
                        "D": "Organizational cultures and styles."
                },
                "correctAnswer": "B",
                "explanation": "According to the PMBOK\u00ae Guide, the Plan Communications Management process is the process of\ndeveloping an appropriate approach and plan for project communication activities based on the\ninformation needs of each stakeholder or group.\nQuestions and Answers PDF 6/1621\n\n\nQuestions & Answers PDF P-7\n\nEnterprise Environmental Factors (EEFs): These are a primary input to this process. EEFs refer to\nconditions, not under the immediate control of the project team, that influence, constrain, or direct\nthe project. In the context of communications, these include organizational culture, structures, and\nexisting human resources. They specifically influence how the communication plan is shaped by\nidentifying what communication channels are available, the geographic distribution of facilities, and\nthe established communication tools.\nOther Inputs: Other standard inputs for this process include the Project Charter, Project Management\nPlan (specifically the Resource Management Plan and Stakeholder Engagement Plan), Project\nDocuments (like the Stakeholder Register), and Organizational Process Assets (OPAs).\nWhy the other options are incorrect:\nA . Communication models: These are categorized as Tools and Techniques (specifically under\nCommunication Technology/Methods) used during the process to facilitate the exchange of\ninformation, rather than being an input document or condition.\nC . Organizational communications: This is an output of the Manage Communications process (the\nexecution phase), representing the actual artifacts produced (emails, reports, presentations), not an\ninput for planning.\nD . Organizational cultures and styles: While these are important, they are technically a subset of\nEnterprise Environmental Factors. In PMI examination logic, if both a specific factor and its parent\ncategory (EEFs) are listed, the official \"Input\" as defined in the PMBOK\u00ae Guide process map is the\nhigher-level category (Enterprise Environmental Factors)."
        },
        {
                "id": 6,
                "original_id": 6,
                "question": "Regression analysis, failure mode and effect analysis (FMEA), fault tree analysis (FTA), and trend analysis are examples of which tool or technique?",
                "options": {
                        "A": "Expert judgment",
                        "B": "Forecasting methods",
                        "C": "Earned value management",
                        "D": "Analytical techniques"
                },
                "correctAnswer": "D",
                "explanation": "According to the PMBOK\u00ae Guide, specifically within the Monitor and Control Project Work process,\nthese specific methods are categorized under Data Analysis, which falls under the broader umbrella\nof Analytical techniques.\nAnalytical Techniques: These are used to evaluate, study, or forecast potential outcomes based on\nvariations of project or environmental variables and their relationships with other variables.\nRegression Analysis: Used to examine the relationship between a dependent variable and one or\nmore independent variables to predict future performance.\nFailure Mode and Effect Analysis (FMEA): A procedure in which each potential failure mode in every\ncomponent of a product is analyzed to determine its effect on the reliability of that component and\non the system.\nFault Tree Analysis (FTA): A top-down, deductive failure analysis in which an undesired state of a\nsystem is analyzed using Boolean logic to combine a series of lower-level events.\nTrend Analysis: Uses mathematical models to forecast future outcomes based on historical results.\nWhy the other options are incorrect:\nA . Expert judgment: While experts may perform these analyses, the specific mathematical and\nlogical models listed (Regression, FMEA, FTA) are defined as techniques of data analysis, not the\njudgment itself.\nB . Forecasting methods: While trend and regression analysis can be used for forecasting, FMEA and\nFTA are primarily risk and quality analysis tools used to identify failures, not necessarily to forecast\nproject completion dates or costs.\nC . Earned value management (EVM): EVM is a specific methodology that combines scope, schedule,\nand resource measurements. While it uses some analytical logic (like CPI and SPI), it does not\nencompass the structural failure or logical deduction models like FTA or FMEA."
        },
        {
                "id": 7,
                "original_id": 7,
                "question": "The Perform Quality Assurance process occurs in which Process Group?",
                "options": {
                        "A": "Executing",
                        "B": "Monitoring and Controlling",
                        "C": "Initiating",
                        "D": "Planning"
                },
                "correctAnswer": "A",
                "explanation": "According to the PMBOK\u00ae Guide, the process traditionally known as Perform Quality Assurance\n(which is renamed/integrated as Manage Quality in more recent editions like the 6th Edition) is a key\nprocess within the Executing Process Group.\nExecuting Process Group: This group consists of those processes performed to complete the work\ndefined in the project management plan to satisfy the project specifications. Since Quality Assurance\ninvolves auditing the quality requirements and the results from quality control measurements to\nensure that appropriate quality standards and operational definitions are used, it is an active part of\n\"managing\" the project's execution.\nPurpose: The primary focus of this process is to increase the probability that the project will meet the\nquality standards and to improve the processes being used to create the deliverables. It is often\nreferred to as the \"organizational\" or \"process-oriented\" aspect of quality.\nWhy the other options are incorrect:\nB . Monitoring and Controlling: This group contains the Control Quality process. While Quality\nAssurance (Manage Quality) and Control Quality are closely related, Control Quality is focused on the\nphysical deliverables (outputs), whereas Quality Assurance is focused on the processes (execution)\nused to create those deliverables.\nC . Initiating: This group focuses on defining a new project or phase and obtaining authorization (e.g.,\nDevelop Project Charter). Quality processes are not defined or performed at this high level.\nD . Planning: This group contains the Plan Quality Management process, which identifies quality\nrequirements and standards for the project and its deliverables. Planning determines what will be\ndone, while Executing (Quality Assurance) ensures it is being done correctly."
        },
        {
                "id": 8,
                "original_id": 8,
                "question": "Enterprise environmental factors are an input to which process?",
                "options": {
                        "A": "Control Scope",
                        "B": "Define Scope",
                        "C": "Plan Scope Management",
                        "D": "Collect Requirements"
                },
                "correctAnswer": "C",
                "explanation": "According to the PMBOK\u00ae Guide, specifically the mapping of inputs, tools, techniques, and outputs\n(ITTOs), Enterprise Environmental Factors (EEFs) serve as a formal input to the Plan Scope\nManagement process.\nPlan Scope Management: This is the process of creating a scope management plan that documents\nhow the project and product scope will be defined, validated, and controlled.\nRole of EEFs: Because this process sets the framework for all other scope activities, it must account\nfor external and internal factors such as the organization's culture, infrastructure, personnel\nadministration, and marketplace conditions. These factors influence how scope will be managed\n(e.g., a highly bureaucratic organization will require more formal scope change procedures than a\nstartup).\nConsistency across Planning: In PMI methodology, EEFs are standard inputs to almost all Planning\nprocesses across different Knowledge Areas, as they provide the context and constraints within\nwhich the plans must be developed.\nWhy the other options are incorrect:\nA . Control Scope: This is a Monitoring and Controlling process. The inputs here are typically the\nProject Management Plan, project documents, work performance data, and Organizational Process\nAssets (OPAs). EEFs are generally not an input to the \"Control\" phase of scope.\nB . Define Scope: The inputs for this process include the Project Charter, Project Management Plan,\nand various project documents (like the Requirements Documentation). While EEFs influence the\nproject, they are not listed as a standard formal input for the specific process of writing the Project\nScope Statement.\nD . Collect Requirements: Similar to Define Scope, this process relies on the Project Charter, Project\nManagement Plan, and Project Documents. It focuses on gathering stakeholder needs rather than\nQuestions and Answers PDF 10/1621\n\n\nQuestions & Answers PDF P-11\n\nthe environmental constraints provided by EEFs."
        },
        {
                "id": 9,
                "original_id": 9,
                "question": "Which process develops options and actions to enhance opportunities and reduce threats to project objectives?",
                "options": {
                        "A": "Identify Risks",
                        "B": "Control Risks",
                        "C": "Plan Risk Management",
                        "D": "Plan Risk Responses"
                },
                "correctAnswer": "D",
                "explanation": "According to the PMBOK\u00ae Guide, the process of Plan Risk Responses is specifically defined as the\nprocess of developing options, selecting strategies, and agreeing on actions to address overall\nproject risk exposure, as well as to treat individual project risks.\nAddressing Threats and Opportunities: This process identifies specific ways to handle risks. For\nthreats (negative risks), strategies include Avoid, Transfer,Mitigate, or Accept. For opportunities\n(positive risks), strategies include Exploit, Share, Enhance, or Accept.\nEnhancing and Reducing: The primary goal is to \"enhance opportunities\" by increasing their\nprobability or impact and to \"reduce threats\" by decreasing their probability or impact.\nAction-Oriented: Unlike the identification or analysis phases, this process results in the Risk\nResponse Plan, which is integrated into the Project Management Plan and includes budget and\nschedule allocations for the chosen responses.\nWhy the other options are incorrect:\nA . Identify Risks: This is the process of determining which risks may affect the project and\ndocumenting their characteristics. It focuses on finding the risks, not on developing the actions to fix\nthem.\nQuestions and Answers PDF 11/1621\n\n\nQuestions & Answers PDF P-12\n\nB . Control Risks (referred to as Monitor Risks in newer editions): This is a Monitoring and Controlling\nprocess. It involves tracking identified risks, monitoring residual risks, identifying new risks, and\nevaluating risk process effectiveness. It does not \"develop\" the initial options; it ensures the\ndeveloped options are working.\nC . Plan Risk Management: This process defines how to conduct risk management activities for a\nproject. It establishes the \"methodology\" and \"rules of engagement\" for risk management but does\nnot address specific individual risks or their response actions."
        },
        {
                "id": 10,
                "original_id": 10,
                "question": "The process of establishing the policies, procedures, and documentation for planning, developing, managing, executing, and controlling the project schedule is known as:",
                "options": {
                        "A": "Plan Schedule Management.",
                        "B": "Develop Project Charter .",
                        "C": "Develop Schedule.",
                        "D": "Plan Scope Management."
                },
                "correctAnswer": "A",
                "explanation": "According to the PMBOK\u00ae Guide, specifically within the Project Schedule Management knowledge\narea, Plan Schedule Management is the first process performed.\nCore Function: This process is dedicated to establishing the \"rules of engagement\" for the project's\ntimeline. It results in the Schedule Management Plan, which is a subsidiary component of the Project\nManagement Plan.\nKey Responsibilities: It defines how the project schedule will be created (tools and methodologies),\nhow it will be measured (units of measure like hours or days), how it will be maintained, and how\nvariances will be managed.\nDocumentation: It provides the guidance and direction on how the project schedule will be managed\nthroughout the project. Without this process, there would be no formal agreement on how to\ndevelop or control the schedule.\nQuestions and Answers PDF 12/1621\n\n\nQuestions & Answers PDF P-13\n\nWhy the other options are incorrect:\nB . Develop Project Charter: This is an Initiation process. While it may include a high-level summary\nmilestone schedule, it does not establish the detailed policies or procedures for managing the\nschedule throughout the project life cycle.\nC . Develop Schedule: This is the process of analyzing activity sequences, durations, resource\nrequirements, and schedule constraints to create the Project Schedule model. This process uses the\npolicies established in Plan Schedule Management but does not create the policies themselves.\nD . Plan Scope Management: This process is concerned with the Project Scope, not the schedule. It\nestablishes the policies and procedures for defining, validating, and controlling the project scope.\nQuestions and Answers PDF 13/1621\n\n\nQuestions & Answers PDF P-14"
        },
        {
                "id": 11,
                "original_id": 11,
                "question": "Which input to the Manage Stakeholder Engagement process is used to document changes that occur during the project?",
                "options": {
                        "A": "Issue log",
                        "B": "Change log",
                        "C": "Expert judgment",
                        "D": "Change requests"
                },
                "correctAnswer": "B",
                "explanation": "According to the PMBOK\u00ae Guide, the Manage Stakeholder Engagement process is the process of\ncommunicating and working with stakeholders to meet their needs and expectations, address issues,\nand foster appropriate stakeholder engagement.\nChange Log: This is a specific Project Document used as an input to this process. The change log is\nused to document changes that occur during a project. These changes\u2014and their impact on the\nproject in terms of time, cost, and risk\u2014must be communicated to the appropriate stakeholders to\nmanage their expectations and maintain their support.\nPurpose in Stakeholder Engagement: When a change is approved or rejected, it affects various\nstakeholders. The project manager uses the change log to ensure they are proactively addressing\nhow these changes might shift a stakeholder's level of engagement or concerns.\nWhy the other options are incorrect:\nA . Issue log: While also an input to this process, the issue log is used to document and monitor\ncurrent problems or gaps that need to be addressed. It does not formally document the \"changes\" to\nthe project scope, schedule, or budget in the way the change log does.\nC . Expert judgment: This is a Tool and Technique, not an input. It involves the specialized knowledge\nof individuals or groups to help manage stakeholder expectations.\nD . Change requests: These are typically an output of this process (or other monitoring and\ncontrolling processes). Change requests are the formal proposals to modify a document, deliverable,\nor baseline; the record of what happened to those requests is what resides in the Change Log.\nQuestions and Answers PDF 14/1621\n\n\nQuestions & Answers PDF P-15"
        },
        {
                "id": 12,
                "original_id": 12,
                "question": "An input to the Plan Stakeholder Management process is:",
                "options": {
                        "A": "The project charter .",
                        "B": "The stakeholder analysis.",
                        "C": "A communication management plan.",
                        "D": "A stakeholder register ."
                },
                "correctAnswer": "D",
                "explanation": "According to the PMBOK\u00ae Guide, the Plan Stakeholder Engagement process (referred to as Plan\nStakeholder Management in earlier editions) is the process of developing approaches to involve\nproject stakeholders based on their needs, expectations, interests, and potential impact on the\nproject.\nStakeholder Register: This is a critical Project Document and a primary input to this process. It\nprovides the list of all identified stakeholders along with their classification, interests, and influence\nlevels. You cannot plan how to manage or engage stakeholders without first having the list of who\nthey are and what their requirements are, which is exactly what the register provides.\nLogical Flow: The process of Identify Stakeholders produces the Stakeholder Register as an output.\nThat register then flows directly into Plan Stakeholder Engagement as an input so that the project\nmanager can create a tailored engagement strategy.\nWhy the other options are incorrect:\nA . The project charter: While the project charter is an input to the Identify Stakeholders process\n(because it lists high-level stakeholders and sponsors), it is typically not the primary input for the\ndetailed Planning of stakeholder engagement. The register is more specific and refined.\nB . The stakeholder analysis: This is a Tool and Technique used within the processes (both Identify\nStakeholders and Plan Stakeholder Engagement) to gather and evaluate information. It is the action\nof analyzing, not a standalone input document.\nQuestions and Answers PDF 15/1621\n\n\nQuestions & Answers PDF P-16\n\nC . A communication management plan: This is usually an output developed alongside or after the\nstakeholder engagement plan. While the two are closely linked, the Stakeholder Engagement Plan\ndefines the \"why\" and \"who\" of engagement, while the Communications Management Plan defines\nthe \"how,\" \"when,\" and \"what.\""
        },
        {
                "id": 13,
                "original_id": 13,
                "question": "An input to the Plan Cost Management process is:",
                "options": {
                        "A": "Cost estimates.",
                        "B": "Resource calendars,",
                        "C": "The project charter,",
                        "D": "The risk register ."

                "explanation": "According to the PMBOK\u00ae Guide (Project Risk Management), Risk Categorization is a specific tool and\ntechnique used during the Perform Qualitative Risk Analysis process.\nThe primary goal of risk categorization is to group project risks by their sources (e.g., using a Risk\nBreakdown Structure - RBS), by the area of the project affected (e.g., WBS work package), or by other\nuseful categories (e.g., technical, external, environmental, or project management) to identify the\nareas of the project most exposed to the effects of uncertainty.\nGrouping for Effectiveness: By categorizing risks, the project manager can identify common root\ncauses and develop more effective Risk Response Plans.\nRelationship to RBS: The Risk Breakdown Structure is the most common framework used for this\ncategorization, providing a hierarchical representation of potential risk sources.\nAnalysis of Distractors:\nA . Plan Risk Responses: This process focuses on developing strategies (Avoid, Transfer,Mitigate, etc.)\nto address the risks. While it uses the categories identified earlier, categorization itself is an\nanalytical technique performed during the qualitative phase.\nB . Plan Risk Management: This process defines how risk activities will be performed. It creates the\nframework (like the RBS template), but the actual act of categorizing identified risks happens during\nthe qualitative analysis.\nD . Perform Quantitative Risk Analysis: This process uses numerical methods (like Monte Carlo\nsimulations) to analyze the effect of risks. It relies on the prioritization and categorization performed\nin the qualitative step but does not perform the categorization itself."
        }
    ];

    let currentIndex = 0;
    let userAnswers = {};
    let evaluatedQuestions = {};
    let isReviewMode = false;

    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('results-screen');
    const progressText = document.getElementById('progress-text');
    const scoreTracking = document.getElementById('score-tracking');
    const questionTextEl = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const explanationBox = document.getElementById('explanation-box');
    const explanationStatus = document.getElementById('explanation-status');
    const explanationTextEl = document.getElementById('explanation-text');
    const prevBtn = document.getElementById('prev-btn');
    const actionBtn = document.getElementById('action-btn');

    function loadQuestion() {
        if (questionBank.length === 0) return;
        const currentQ = questionBank[currentIndex];
        
        progressText.innerText = `Question ${currentIndex + 1} of ${questionBank.length}`;
        updateScoreTracker();

        questionTextEl.innerText = currentQ.question;
        optionsContainer.innerHTML = '';
        explanationBox.style.display = 'none';

        prevBtn.disabled = currentIndex === 0;

        const savedAnswer = userAnswers[currentQ.id];
        const isEvaluated = evaluatedQuestions[currentQ.id];

        Object.keys(currentQ.options).forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = `${key}. ${currentQ.options[key]}`;

            if (isReviewMode || isEvaluated) {
                btn.disabled = true;
                if (key === currentQ.correctAnswer) {
                    btn.classList.add('correct');
                }
                if (savedAnswer === key && key !== currentQ.correctAnswer) {
                    btn.classList.add('incorrect');
                }
                if (savedAnswer === key) {
                    btn.classList.add('selected');
                }
            } else {
                if (savedAnswer === key) btn.classList.add('selected');
                btn.onclick = () => selectOption(key);
            }
            optionsContainer.appendChild(btn);
        });

        if (isReviewMode || isEvaluated) {
            explanationBox.style.display = 'block';
            explanationTextEl.innerText = currentQ.explanation;
            if (savedAnswer === currentQ.correctAnswer) {
                explanationStatus.innerText = "Correct Summary";
                explanationStatus.style.color = 'var(--accent-green)';
                explanationBox.style.borderLeftColor = 'var(--accent-green)';
            } else {
                explanationStatus.innerText = "Incorrect / Review Summary";
                explanationStatus.style.color = 'var(--accent-red)';
                explanationBox.style.borderLeftColor = 'var(--accent-red)';
            }
            actionBtn.innerText = currentIndex === questionBank.length - 1 ? (isReviewMode ? "Back to Results" : "Finish Quiz") : "Next Question";
        } else {
            actionBtn.innerText = "Submit Answer";
            actionBtn.disabled = !savedAnswer;
        }
    }

    function selectOption(key) {
        if (evaluatedQuestions[questionBank[currentIndex].id]) return;
        userAnswers[questionBank[currentIndex].id] = key;
        const buttons = optionsContainer.getElementsByClassName('option-btn');
        Array.from(buttons).forEach((btn, idx) => {
            const currentKey = Object.keys(questionBank[currentIndex].options)[idx];
            if (currentKey === key) btn.classList.add('selected');
            else btn.classList.remove('selected');
        });
        actionBtn.disabled = false;
    }

    function handleAction() {
        const currentQ = questionBank[currentIndex];
        const isEvaluated = evaluatedQuestions[currentQ.id];

        if (!isReviewMode && !isEvaluated) {
            evaluatedQuestions[currentQ.id] = true;
            loadQuestion();
        } else {
            if (currentIndex < questionBank.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        }
    }

    function handlePrev() { if (currentIndex > 0) { currentIndex--; loadQuestion(); } }

    function updateScoreTracker() {
        let accurateCount = 0;
        let evaluatedCount = Object.keys(evaluatedQuestions).length;
        questionBank.forEach(q => { if (evaluatedQuestions[q.id] && userAnswers[q.id] === q.correctAnswer) accurateCount++; });
        scoreTracking.innerText = `Score: ${accurateCount}/${evaluatedCount}`;
    }

    function showResults() {
        quizScreen.style.display = 'none';
        resultsScreen.style.display = 'block';
        let correctTotal = 0;
        questionBank.forEach(q => { if (userAnswers[q.id] === q.correctAnswer) correctTotal++; });
        const scorePercent = Math.round((correctTotal / questionBank.length) * 100);
        document.getElementById('final-score').innerText = `${scorePercent}%`;
        document.getElementById('results-summary').innerText = `You correctly answered ${correctTotal} out of ${questionBank.length} questions in this session.`;
    }

    function enterReviewMode() { isReviewMode = true; resultsScreen.style.display = 'none'; quizScreen.style.display = 'block'; currentIndex = 0; loadQuestion(); }
    function restartQuiz() { currentIndex = 0; userAnswers = {}; evaluatedQuestions = {}; isReviewMode = false; resultsScreen.style.display = 'none'; quizScreen.style.display = 'block'; loadQuestion(); }

    window.onload = loadQuestion;
</script>
</body>
</html>
