<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Practice Quiz Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { color: #1a365d; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #2b6cb0; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #2b6cb0; color: white; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; transition: background 0.2s; }
        button:hover { background-color: #2c5282; }
        
        #login-form { display: block; }
        #portal-content { display: none; text-align: left; margin-top: 20px; }
        
        .module-item { display: block; padding: 12px; margin-bottom: 10px; background-color: #ebf8ff; border-left: 5px solid #3182ce; border-radius: 4px; text-decoration: none; color: #2b6cb0; font-weight: bold; transition: transform 0.2s; }
        .module-item:hover { transform: translateX(5px); background-color: #e2e8f0; }
        .error { color: #e53e3e; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Exam Practice Quizzes</h1>
        <p style="color: #718096; margin-bottom: 20px;">Exam Practice Quiz Suite</p>
        
        <div id="login-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button onclick="attemptLogin()">Login</button>
            <div id="error-msg" class="error"></div>
        </div>

        <div id="portal-content">
            <h3 style="color: #1a365d; margin-bottom: 15px;">Select a Study Module</h3>
            <div id="modules-grid"></div>
            <button style="margin-top: 20px; background-color: #718096;" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const AUTH_CONFIG = { u: "dee233", p: "Sup3rW0m4n!!" };

        function attemptLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            
            // Corrected check to use AUTH_CONFIG.u and AUTH_CONFIG.p[cite: 1]
            if (user === AUTH_CONFIG.u && pass === AUTH_CONFIG.p) {
                localStorage.setItem('scor_session', 'authenticated');
                document.getElementById('error-msg').innerText = "";
                showPortal();
            } else {
                document.getElementById('password').value = '';
                document.getElementById('error-msg').innerText = "Invalid credentials!";
            }
        }

        function showPortal() {
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('portal-content').style.display = 'block';
            
            const grid = document.getElementById('modules-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 14; i++) {
                const link = document.createElement('a');
                link.className = 'module-item';
                link.href = `Module${i}.html`;
                link.innerText = `📚 Practice Module ${i}`;
                grid.appendChild(link);
            }
        }

        function logout() {
            localStorage.removeItem('scor_session');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('portal-content').style.display = 'none';
        }

        if (localStorage.getItem('scor_session') === 'authenticated') {
            showPortal();
        }
    </script>
</body>
</html>
