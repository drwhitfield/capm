<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal - Authentication</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --border-color: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 2rem 1rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; background-color: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 2.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        h1 { font-size: 1.75rem; color: var(--accent-blue); margin-bottom: 1.5rem; text-align: center; }
        
        /* Form Styling */
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.75rem 1rem; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); font-size: 1rem; transition: border-color 0.2s; }
        input[type="text"]:focus, input[type="password"]:focus { outline: none; border-color: var(--accent-blue); }
        
        .btn { width: 100%; background-color: var(--accent-blue); color: var(--bg-primary); border: none; border-radius: 6px; padding: 0.75rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 0.5rem; }
        .btn:hover { opacity: 0.9; }
        
        .error-message { color: var(--accent-red); font-size: 0.9rem; margin-top: 1rem; text-align: center; display: none; }
        
        /* Portal Dashboard Styling */
        #portal-dashboard { display: none; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
        @media (max-width: 480px) { .grid-container { grid-template-columns: 1fr; } }
        
        .module-link { display: block; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem; text-align: center; color: var(--text-main); text-decoration: none; font-weight: 600; transition: all 0.2s ease; }
        .module-link:hover { border-color: var(--accent-blue); background-color: rgba(56, 189, 248, 0.05); transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>Quiz Bank Portal Authentication</h1>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
            <div id="error-box" class="error-message">Invalid username or password. Please try again.</div>
        </form>
    </div>

    <div id="portal-dashboard">
        <h1>Welcome to the Quiz Modules</h1>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 1.5rem;">Select a module configuration to launch the testing interface:</p>
        <div class="grid-container" id="modules-grid">
            </div>
    </div>
</div>

<script>
    // Configuration details
    const AUTH_CONFIG = {
        u: "dee233",
        p: "Sup3rW0m4n!!"
    };

    function handleLogin(event) {
        event.preventDefault();
        
        const userField = document.getElementById('username').value;
        const passField = document.getElementById('password').value;
        const errorBox = document.getElementById('error-box');

        if (userField === AUTH_CONFIG.u && passField === AUTH_CONFIG.p) {
            // Success: Hide login window and display protected navigation menu
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('portal-dashboard').style.display = 'block';
            generateModuleLinks();
        } else {
            // Failure: Reset password fields and present notification alert
            document.getElementById('password').value = '';
            errorBox.style.display = 'block';
        }
    }

    function generateModuleLinks() {
        const grid = document.getElementById('modules-grid');
        grid.innerHTML = ''; // Sanitize container

        // Generate linkages from Module 1 up to Module 14
        for (let i = 1; i <= 14; i++) {
            const link = document.createElement('a');
            link.href = `Module${i}.html`;
            link.className = 'module-link';
            link.innerText = `Module ${i} Examination`;
            grid.appendChild(link);
        }
    }
</script>
</body>
</html>
